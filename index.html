<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre des appels</title>

<style>
body {
  font-family: Arial;
  background: #f4f7f6;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 700px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.logo {
  height: 60px;
}

h1 {
  margin: 0;
  color: #1b5e20;
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

button {
  margin-top: 15px;
  background: #1b5e20;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Registre des appels</h1>
</div>

<!-- ✅ FORMULAIRE CORRECT -->
<form action="https://script.google.com/macros/s/AKfycbyoqQPBFc42_hIe-1RvcvgojYiYGE9ie07P70t8WroyrCBBmaapimXeHbrbanWYMFAYow/exec"
      method="POST"
      target="hidden_iframe">

<label>Utilisateur</label>
<select name="utilisateur">
  <option>Mamadou</option>
  <option>Daby</option>
  <option>Yacouba</option>
</select>

<label>Date</label>
<input type="date" name="date" required>

<label>Nom</label>
<input type="text" name="nom">

<label>Téléphone</label>
<input type="text" name="telephone">

<label>Code postal</label>
<input type="text" name="code_postal">

<label>Adresse</label>
<input type="text" name="adresse">

<label>Commentaire</label>
<textarea name="commentaire"></textarea>

<label>
  <input type="checkbox" name="confirme" value="Oui">
  Confirmé
</label>

<button type="submit">Enregistrer</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
document.querySelector("form").addEventListener("submit", function () {
  setTimeout(() => {
    alert("✅ Appel enregistré !");
    this.reset();
  }, 500);
});
</script>

</body>
</html>
