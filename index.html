<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registre des Appels Clients</title>
    <style>
        :root {
            --primary-color: #1b5e20;
            --background-color: #f4f7f6;
            --container-bg: #ffffff;
            --text-color: #333333;
            --border-color: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: var(--container-bg);
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .main-header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 30px;
            display: flex;
            align-items: center;
        }

        .logo {
            height: 80px;
            margin-right: 20px;
            background-color: white;
            border-radius: 8px;
            padding: 5px;
        }

        .main-header h1 {
            margin: 0;
            color: white;
            font-size: 1.8em;
        }

        .content {
            padding: 30px;
        }

        h2 {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .checkbox-group {
            flex-direction: row;
            align-items: center;
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .checkbox-group input {
            margin-left: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9em;
        }

        .checkbox-group label {
            margin-bottom: 0;
            cursor: pointer;
        }

        input[type="text"], input[type="tel"], input[type="date"], textarea, select {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #124016;
        }

        .btn-export {
            background-color: #ffd600;
            color: #333;
            margin-bottom: 15px;
        }

        .btn-export:hover {
            background-color: #e6c200;
        }

        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.9em;
        }

        th, td {
            border: 1px solid var(--border-color);
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            font-weight: bold;
            color: var(--primary-color);
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .select-confirm {
            padding: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .select-confirm.oui {
            color: #28a745;
            border-color: #28a745;
            background-color: #e8f5e9;
        }

        .select-confirm.non {
            color: #dc3545;
            border-color: #dc3545;
            background-color: #ffebee;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 6px 10px;
            font-size: 0.8em;
        }

        .btn-delete:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

<div class="container">
    <header class="main-header">
        <img src="logo.png" alt="Sotrama Logo" class="logo" onerror="this.style.display='none'">
        <h1>Registre des Appels Clients</h1>
    </header>
    
    <div class="content">
        <h2>Enregistrer un nouvel appel</h2>
        
        <form id="callForm">
            <div class="form-grid">
                <div class="form-group">
                    <label for="nom">Nom du client *</label>
                    <input type="text" id="nom" required placeholder="Ex: Jean Dupont">
                </div>
                <div class="form-group">
                    <label for="telephone">Numéro de téléphone *</label>
                    <input type="tel" id="telephone" required placeholder="Ex: 06 12 34 56 78">
                </div>
                <div class="form-group">
                    <label for="code_postal">Code Postal</label>
                    <input type="text" id="code_postal" placeholder="Ex: 75000" maxlength="5">
                </div>
                <div class="form-group">
                    <label for="adresse">Adresse</label>
                    <input type="text" id="adresse" placeholder="Ex: 10 Rue de la Paix">
                </div>
                <div class="form-group full-width">
                    <label for="date">Date de l'appel *</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group full-width">
                    <label for="commentaire">Commentaire / Objet de l'appel</label>
                    <textarea id="commentaire" placeholder="Détails de la demande..."></textarea>
                </div>
                <div class="form-group checkbox-group full-width">
                    <label for="confirme">Déjà confirmé à l'enregistrement ?</label>
                    <input type="checkbox" id="confirme">
                </div>
            </div>
            <button type="submit">Enregistrer l'appel</button>
        </form>

        <div class="header-actions">
            <h2>Historique des appels</h2>
            <button id="exportBtn" class="btn-export">Exporter vers Excel (CSV)</button>
        </div>

        <div style="overflow-x:auto;">
            <table id="callsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Nom du client</th>
                        <th>Téléphone</th>
                        <th>CP</th>
                        <th>Adresse</th>
                        <th>Commentaire</th>
                        <th>Confirmé</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Les appels s'afficheront ici -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Initialiser le champ date avec la date d'aujourd'hui
    window.onload = () => {
        const now = new Date();
        document.getElementById('date').value = now.toISOString().split('T')[0];
        displayCalls();
    };

    let calls = JSON.parse(localStorage.getItem('clientCalls')) || [];

    // Ajouter un appel
    document.getElementById('callForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const newCall = {
            id: Date.now(), 
            nom: document.getElementById('nom').value,
            telephone: document.getElementById('telephone').value,
            code_postal: document.getElementById('code_postal').value,
            adresse: document.getElementById('adresse').value,
            date: document.getElementById('date').value,
            commentaire: document.getElementById('commentaire').value,
            confirme: document.getElementById('confirme').checked
        };

        calls.push(newCall);
        
        calls.sort((a, b) => b.id - a.id);

        localStorage.setItem('clientCalls', JSON.stringify(calls));
        
        displayCalls();
        
        // Réinitialiser le formulaire
        document.getElementById('nom').value = '';
        document.getElementById('telephone').value = '';
        document.getElementById('code_postal').value = '';
        document.getElementById('adresse').value = '';
        document.getElementById('commentaire').value = '';
        document.getElementById('confirme').checked = false;
    });

    // Mettre à jour le statut "Confirmé" depuis le tableau
    function updateStatus(id, selectElement) {
        const callIndex = calls.findIndex(call => call.id === id);
        if(callIndex !== -1) {
            calls[callIndex].confirme = selectElement.value === 'true';
            localStorage.setItem('clientCalls', JSON.stringify(calls));
            
            selectElement.className = 'select-confirm ' + (calls[callIndex].confirme ? 'oui' : 'non');
        }
    }

    // Afficher les appels
    function displayCalls() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if(calls.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Aucun appel enregistré pour le moment.</td></tr>';
            return;
        }

        calls.forEach(call => {
            const dateFr = call.date.split('-').reverse().join('/');
            
            const selectClass = call.confirme ? 'oui' : 'non';
            const selectHtml = `
                <select class="select-confirm ${selectClass}" onchange="updateStatus(${call.id}, this)">
                    <option value="true" ${call.confirme ? 'selected' : ''}>Oui</option>
                    <option value="false" ${!call.confirme ? 'selected' : ''}>Non</option>
                </select>
            `;
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${dateFr}</td>
                <td><strong>${call.nom}</strong></td>
                <td>${call.telephone}</td>
                <td>${call.code_postal || ''}</td>
                <td>${call.adresse}</td>
                <td>${call.commentaire}</td>
                <td>${selectHtml}</td>
                <td><button class="btn-delete" onclick="deleteCall(${call.id})">Supprimer</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Supprimer un appel
    function deleteCall(id) {
        if(confirm("Êtes-vous sûr de vouloir supprimer cet enregistrement ?")) {
            calls = calls.filter(call => call.id !== id);
            localStorage.setItem('clientCalls', JSON.stringify(calls));
            displayCalls();
        }
    }

    // Exporter vers Excel (Format CSV)
    document.getElementById('exportBtn').addEventListener('click', function() {
        if(calls.length === 0) {
            alert("Il n'y a aucune donnée à exporter.");
            return;
        }

        const separator = ';';
        let csvContent = "\uFEFF"; 
        
        csvContent += `Date${separator}Nom du client${separator}Téléphone${separator}Code Postal${separator}Adresse${separator}Commentaire${separator}Confirmé\n`;

        calls.forEach(call => {
            const formatCSV = (text) => `"${(text || '').toString().replace(/"/g, '""')}"`;
            const dateFr = call.date.split('-').reverse().join('/');
            const textConfirm = call.confirme ? 'Oui' : 'Non';

            let row = [
                dateFr,
                call.nom,
                call.telephone,
                call.code_postal,
                call.adresse,
                call.commentaire,
                textConfirm
            ].map(formatCSV).join(separator);
            
            csvContent += row + "\n";
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        
        link.setAttribute("href", url);
        link.setAttribute("download", `appels_clients_${new Date().toISOString().split('T')[0]}.csv`);
        link.style.visibility = 'hidden';
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });
</script src="script.js"></script>
</body>
</html>
