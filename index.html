<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre appels</title>

<style>
body {
  font-family: Arial;
  background: #f4f7f6;
  padding: 20px;
}
.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
}
input, select, textarea {
  width: 100%;
  margin: 10px 0;
  padding: 8px;
}
button {
  background: green;
  color: white;
  padding: 10px;
  border: none;
}
</style>

</head>

<body>

<div class="container">

<h2>Registre des appels</h2>

<!-- ✅ FORMULAIRE CORRECT (IMPORTANT) -->
<form 
  method="POST"
  action="https://script.google.com/macros/s/AKfycbyoqQPBFc42_hIe-1RvcvgojYiYGE9ie07P70t8WroyrCBBmaapimXeHbrbanWYMFAYow/exec"
  target="hidden_iframe"
  id="callForm"
>

<label>Utilisateur</label>
<select name="utilisateur">
  <option>Mamadou</option>
  <option>Daby</option>
  <option>Yacouba</option>
</select>

<label>Date</label>
<input type="date" name="date" required>

<label>Nom</label>
<input type="text" name="nom">

<label>Téléphone</label>
<input type="text" name="telephone">

<label>Code postal</label>
<input type="text" name="code_postal">

<label>Adresse</label>
<input type="text" name="adresse">

<label>Commentaire</label>
<textarea name="commentaire"></textarea>

<label>
  <input type="checkbox" name="confirme" value="Oui">
  Confirmé
</label>

<button type="submit">Enregistrer</button>

</form>

<!-- ✅ Evite redirection -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
document.getElementById("callForm").addEventListener("submit", function () {
  setTimeout(() => {
    alert("✅ Appel enregistré !");
  }, 300);
});
</script>

</body>
</html>
