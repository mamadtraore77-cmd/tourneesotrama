<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre des appels</title>

<style>
body {
  font-family: "Segoe UI", Arial;
  background: #f4f7f6;
  margin: 0;
  padding: 30px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
  margin-bottom: 20px;
}

.logo {
  height: 60px;
}

.title {
  font-size: 22px;
  font-weight: bold;
  color: #1b5e20;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
}

.full {
  grid-column: 1 / -1;
}

label {
  font-weight: bold;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

textarea {
  min-height: 70px;
}

button {
  background: #1b5e20;
  color: white;
  padding: 10px;
  border: none;
  cursor: pointer;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th {
  background: #1b5e20;
  color: white;
  padding: 10px;
}

td {
  padding: 8px;
  border: 1px solid #ddd;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" class="logo">
  <div class="title">Registre des appels clients</div>
</div>

<h2>Enregistrer un appel</h2>

<!-- ✅ FORMULAIRE -->
<<form id="callForm" 

<div class="form-grid">

<div>
<label>Utilisateur</label>
<select name="utilisateur" id="utilisateur">
  <option>Mamadou</option>
  <option>Daby</option>
  <option>Yacouba</option>
</select>
</div>

<div>
<label>Date</label>
<input type="date" name="date" id="date" required>
</div>

<div>
<label>Nom</label>
<input type="text" name="nom" id="nom">
</div>

<div>
<label>Téléphone</label>
<input type="text" name="telephone" id="telephone">
</div>

<div>
<label>Code postal</label>
<input type="text" name="code_postal" id="code_postal">
</div>

<div>
<label>Ville</label>
<input type="text" name="ville" id="ville">
</div>

<div class="full">
<label>Adresse</label>
<input type="text" name="adresse" id="adresse">
</div>

<div class="full">
<label>Commentaire</label>
<textarea name="commentaire" id="commentaire"></textarea>
</div>

<div class="full">
<label style="display:flex; align-items:center; gap:10px;">
  <input type="checkbox" name="confirme" id="confirme">
  Confirmé
</label>
</div>

<div class="full">
<button type="submit">✅ Enregistrer</button>
</div>

</div>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<!-- ✅ TABLEAU DYNAMIQUE -->
<h2 style="margin-top:40px;">📊 Historique des appels</h2>

<input type="text" id="search" placeholder="🔍 Rechercher..." 
       style="width:100%; padding:10px; margin-bottom:10px;">

<table id="table">
  <thead>
    <tr>
      <th>Date</th>
      <th>Nom</th>
      <th>Téléphone</th>
      <th>Ville</th>
      <th>Utilisateur</th>
      <th>Confirmé</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyoqQPBFc42_hIe-1RvcvgojYiYGE9ie07P70t8WroyrCBBmaapimXeHbrbanWYMFAYow/exec";

function chargerDonnees() {
  fetch(URL)
    .then(res => res.json())
    .then(data => {
      const tbody = document.querySelector("#table tbody");
      tbody.innerHTML = "";

      data.slice(1).reverse().forEach(row => {

        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td>${row[3]}</td>
          <td>${row[5]}</td>
          <td>${row[0]}</td>
          <td>${row[8] ? "✅" : "❌"}</td>
        `;

        tbody.appendChild(tr);
      });
    });
}

document.getElementById("search").addEventListener("input", function() {
  const value = this.value.toLowerCase();

  document.querySelectorAll("#table tbody tr").forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value)
      ? ""
      : "none";
  });
});

setInterval(chargerDonnees, 3000);
chargerDonnees();
</script>

</body>
</html>
