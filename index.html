<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre des appels</title>

<style>
:root {
  --primary: #1b5e20;
  --bg: #f4f7f6;
}

body {
  font-family: Arial;
  background: var(--bg);
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 10px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.header {
  display: flex;
  align-items: center;
  margin-bottom: 20px;
}

.logo {
  height: 70px;
  margin-right: 20px;
}

h1 {
  color: var(--primary);
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  background: var(--primary);
  color: white;
  padding: 10px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #124016;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" class="logo" onerror="this.style.display='none'">
