<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre des appels</title>

<style>
:root {
  --primary: #1b5e20;
  --bg: #f4f7f6;
}

body {
  font-family: Arial;
  background: var(--bg);
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
  background: white;
  padding: 30px;
  border-radius: 10px;
}

.header {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  height: 70px;
}

h1 {
  color: var(--primary);
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  margin-top: 15px;
  background: var(--primary);
  color: white;
  padding: 12px;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
  <img src="logo.png" class="logo">
  <h1>Registre des appels clients</h1>
</div>

<h2>Enregistrer un appel</h2>
