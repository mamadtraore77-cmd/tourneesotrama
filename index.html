<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Registre des Appels</title>

<style>
body {
    font-family: Arial;
    background: #f4f7f6;
    padding: 20px;
}
.container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 8px;
}
input, textarea, select {
    width: 100%;
    margin: 5px 0 15px;
    padding: 8px;
}
button {
    background: green;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Enregistrer un appel</h2>

<!-- ✅ FORMULAIRE CONNECTÉ À GOOGLE -->
<form id="callForm"
      action="https://script.google.com/macros/s/AKfycbyoqQPBFc42_hIe-1RvcvgojYiYGE9ie07P70t8WroyrCBBmaapimXeHbrbanWYMFAYow/exec"
      method="POST"
      target="hidden_iframe">

    <label>Utilisateur</label>
    <select name="utilisateur">
        <option>Mamadou</option>
        <option>Frère 1</option>
        <option>Frère 2</option>
    </select>

    <label>Date</label>
    <input type="date" name="date" required>

    <label>Nom</label>
    <input type="text" name="nom" required>

    <label>Téléphone</label>
    <input type="text" name="telephone">

    <label>Code postal</label>
    <input type="text" name="code_postal">

    <label>Adresse</label>
    <input type="text" name="adresse">

    <label>Commentaire</label>
    <textarea name="commentaire"></textarea>

    <label>
        Confirmé
        <input type="checkbox" name="confirme" value="Oui">
    </label>

    <button type="submit">Enregistrer</button>

</form>

<!-- ✅ iframe caché pour éviter redirection -->
<iframe name="hidden_iframe" style="display:none;"></iframe>

</div>

<script>
// message après enregistrement
document.getElementById("callForm").addEventListener("submit", function () {
    setTimeout(() => {
        alert("✅ Appel enregistré dans Google Sheets !");
        document.getElementById("callForm").reset();
    }, 500);
});
</script>

</body>
</html>
